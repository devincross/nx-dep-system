version: '3.8'

services:
  mariadb:
    image: mariadb:11
    container_name: dep-mariadb
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_USER: ${MYSQL_USER:-dep_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dep_password}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      start_period: 10s
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dep-network

networks:
  dep-network:
    driver: bridge

volumes:
  mariadb_data:
    driver: local

