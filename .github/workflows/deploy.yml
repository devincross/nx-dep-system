name: Build and Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip build and deploy existing images'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  # Use lowercase for GHCR compatibility
  IMAGE_PREFIX: devincross

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Get pnpm store directory
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm exec nx run-many --target=lint --all --parallel=3

      - name: Test
        run: pnpm exec nx run-many --target=test --all --parallel=3

  # Detect which apps are affected by the changes
  detect-affected:
    name: Detect Affected Apps
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      affected: ${{ steps.affected.outputs.affected }}
      affected_count: ${{ steps.affected.outputs.affected_count }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get affected apps
        id: affected
        run: |
          # Get changed files between this commit and previous
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)

          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Determine which apps are affected
          APPS=""

          # Check each app
          for app in admin-api client-api landlord-admin client-portal; do
            # App is affected if:
            # 1. Files in apps/$app changed
            # 2. Files in libs/ changed (shared code)
            # 3. Root config files changed (package.json, etc)
            if echo "$CHANGED_FILES" | grep -qE "^apps/$app/|^libs/|^package\.json|^pnpm-lock\.yaml|^nx\.json"; then
              if [ -z "$APPS" ]; then
                APPS="\"$app\""
              else
                APPS="$APPS,\"$app\""
              fi
              echo "App $app is affected"
            fi
          done

          # If no affected apps found, build all (safety fallback)
          if [ -z "$APPS" ]; then
            echo "No specific apps affected, building all apps"
            APPS='"admin-api","client-api","landlord-admin","client-portal"'
          fi

          echo "Affected apps: [$APPS]"
          echo "affected=[$APPS]" >> $GITHUB_OUTPUT

          # Count affected apps
          COUNT=$(echo "[$APPS]" | jq '. | length')
          echo "affected_count=$COUNT" >> $GITHUB_OUTPUT

  build:
    name: Build Docker Images
    needs: detect-affected
    runs-on: ubuntu-latest
    if: needs.detect-affected.outputs.affected_count > 0
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect-affected.outputs.affected) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.app }}
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Output image digest
        run: echo "Image pushed with digest ${{ steps.push.outputs.digest }}"

  deploy:
    name: Deploy to Linode
    needs: [detect-affected, build]
    runs-on: ubuntu-latest
    if: always() && (needs.build.result == 'success' || needs.build.result == 'skipped') && github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy docker-compose to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "/opt/dep-platform"

      - name: Copy nginx config to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          source: "deploy/nginx/conf.d/*"
          target: "/opt/dep-platform"
          strip_components: 2

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINODE_HOST }}
          username: ${{ secrets.LINODE_USER }}
          key: ${{ secrets.LINODE_SSH_KEY }}
          envs: GHCR_PAT,GHCR_USER
          script: |
            set -e
            cd /opt/dep-platform

            # Log deployment start
            echo "Deployment started at $(date)"
            echo "Deploying commit: ${{ github.sha }}"

            # Login to GitHub Container Registry using PAT
            echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USER" --password-stdin

            # Pull latest images
            docker compose -f docker-compose.prod.yml pull

            # Restart services with zero downtime
            docker compose -f docker-compose.prod.yml up -d --remove-orphans

            # Update nginx configuration
            echo "Updating nginx configuration..."
            sudo cp -f /opt/dep-platform/conf.d/*.conf /etc/nginx/conf.d/
            sudo nginx -t && sudo systemctl reload nginx

            # Wait for health checks
            echo "Waiting for services to become healthy..."
            sleep 30

            # Show status
            docker compose -f docker-compose.prod.yml ps

            # Clean up old images
            docker image prune -f

            # Show status
            echo "Deployment completed successfully!"
            docker compose -f docker-compose.prod.yml ps
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          GHCR_USER: devincross

  notify:
    name: Notify on Failure
    needs: [detect-affected, build, deploy]
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Send failure notification
        run: |
          echo "Deployment failed! Check the workflow logs."
          # Add Slack/Discord/email notification here if needed

