# ===========================================
# Client Wildcard Subdomain Configuration
# ===========================================
# Routes: *.801saas.com (except admin.*)
# - /api/* -> client-api (NestJS) on port 3001
# - /* -> client-portal (Vue.js) on port 4201
#
# The client-api uses the Host header to determine
# which tenant database to connect to.

server {
    listen 80;
    server_name *.801saas.com;

    location / {
        proxy_pass http://127.0.0.1:4201;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

