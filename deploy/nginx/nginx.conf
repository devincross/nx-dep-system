# ===========================================
# Main Nginx Configuration for DEP Platform
# ===========================================
# This configuration serves as a reverse proxy for:
# - Admin subdomain (admin.yourdomain.com) -> admin-api + landlord-admin
# - Wildcard subdomains (*.yourdomain.com) -> client-api + client-portal

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript 
               application/xml application/xml+rss text/javascript application/x-javascript;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;

    # Upstream definitions
    upstream admin-api {
        server 127.0.0.1:3000;
    }

    upstream client-api {
        server 127.0.0.1:3001;
    }

    upstream landlord-admin {
        server 127.0.0.1:4200;
    }

    upstream client-portal {
        server 127.0.0.1:4201;
    }

    # Include site configurations
    include /etc/nginx/conf.d/*.conf;
}

